<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Case study — David Ajala</title>
<meta name="description" content="A David Ajala product design case study." />

<!-- Fonts -->
<link rel="preconnect" href="https://api.fontshare.com" crossorigin />
<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet" />

<!-- Tailwind (CDN) + shared config -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind-config.js"></script>

<!-- Custom styles -->
<link rel="stylesheet" href="styles.css" />
</head>
<body class="font-sans antialiased">

<!-- HEADER -->
<header class="sticky top-0 z-40 glass">
  <div class="max-w-[920px] mx-auto px-5 sm:px-8 h-20 flex items-center justify-between">
    <a href="index.html#work" class="inline-flex items-center gap-2 text-sm font-medium hover:text-[color:var(--accent)] transition">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Back to work
    </a>
    <div class="flex items-center gap-2.5">
      <button id="theme-toggle" class="w-11 h-11 grid place-items-center rounded-full border hair bg-[color:var(--surface)] hover:border-[color:var(--accent)] transition" aria-label="Toggle theme">
        <svg class="moon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="sun hidden" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a href="index.html#contact" class="btn btn-dark px-5 py-2.5 text-sm font-semibold">Book a call</a>
    </div>
  </div>
</header>

<main id="case-root" class="max-w-[920px] mx-auto px-5 sm:px-8 pb-20"></main>

<!-- Project content, then the renderer -->
<script src="projects.js"></script>
<script src="case.js"></script>
</body>
</html>
